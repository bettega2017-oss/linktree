        body {

        /* 玻璃質感卡片 */

            backdrop-filter: blur(12px);

            background: rgba(255, 255, 255, 0.11);
            border-color: rgba(255, 255, 255, 0.22);
        }

        /* 側邊條設計 */
        .side-indicator {
            position: absolute;
            left: 0; top: 0; bottom: 0;

            transition: width 0.3s ease;
        }
        .group:hover .side-indicator { width: 6px; }

        /* 閃爍光影掃描 (Shimmer) */
        .shimmer {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            background: linear-gradient(105deg, transparent 40%, rgba(255, 255, 255, 0.08) 50%, transparent 60%);
        }
        .group:hover .shimmer {
            opacity: 1;
            animation: shimmerMove 1.8s infinite;
        }
        @keyframes shimmerMove {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* 背景 Canvas */

            position: fixed;
            inset: 0;
            z-index: 0;
        }

            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);

        }

            border-color: rgba(255, 255, 255, 0.35); 
            transform: translateY(-3px);

        .logo-frame-advanced {

            width: 280px;
            padding: 10px;
            border-radius: 16px;

         }

            border-radius: 10px;

            position: relative;
            z-index: 2;

        .logo-glow {
            position: absolute;
            inset: 0;
            border-radius: 16px;
            pointer-events: none;
            z-index: 1;
            background: linear-gradient(120deg,transparent 20%,rgba(255,255,255,0.7) 50%,
            transparent 80%
            );
            opacity: 0;
            transform: translateX(-100%);
        }

        .logo-frame-advanced:hover .logo-glow {
            opacity: 1;
            animation: logoShimmer 1.6s ease forwards;
        }

        .logo-frame-advanced::after {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 18px;
            background: radial-gradient(circle, rgba(255,255,255,0.25), transparent 70%);
            opacity: 0.15;
            filter: blur(12px);
            z-index: 0;
        }

        .logo-frame-advanced:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(255,255,255,0.3);
        }

        @keyframes logoShimmer {
            0% { transform: translateX(-100%); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: translateX(100%); opacity: 0; }
        }
    </style>

    <!-- 調整後的緩慢流光腳本 -->
    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let orbs = [];

        class LightTrail {
            constructor() {
                this.reset();
                this.x = Math.random() * canvas.width; // 初始位置隨機分布
            }
            reset() {
                this.x = -600; // 從螢幕左側更遠處開始
                this.y = Math.random() * canvas.height;
                this.length = Math.random() * 400 + 300; // 大幅增加長度 (300px - 700px)
                this.speed = Math.random() * 0.8 + 0.2; // 極慢速度 (0.2 - 1.0)
                this.width = Math.random() * 1.2 + 0.3;
                this.color = Math.random() > 0.5 ? '#E8001D' : '#FFFFFF';
                this.opacity = Math.random() * 0.2 + 0.05; // 降低不透明度，產生優雅感
            }
            update() {
                this.x += this.speed;
                if (this.x > canvas.width + this.length) {
                    this.reset();
                }
            }
            draw() {
                ctx.beginPath();
                const grad = ctx.createLinearGradient(this.x, this.y, this.x - this.length, this.y);
                // 產生平滑的絲綢感漸層
                grad.addColorStop(0, 'transparent');
                grad.addColorStop(0.5, this.color + Math.floor(this.opacity * 255).toString(16).padStart(2, '0'));
                grad.addColorStop(1, 'transparent');
                
                ctx.strokeStyle = grad;
                ctx.lineWidth = this.width;
                ctx.lineCap = 'round';
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.length, this.y);
                ctx.stroke();
            }
        }

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            orbs = [];
            // 背景深處的微弱光暈
            for (let i = 0; i < 4; i++) {
                orbs.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 400 + 300,
                    vx: (Math.random() - 0.5) * 0.2,
                    vy: (Math.random() - 0.5) * 0.2,
                    color: i === 0 ? 'rgba(232, 0, 29, 0.04)' : 'rgba(60, 60, 60, 0.06)'
                });
            }
            // 緩慢橫向流光
            for (let i = 0; i < 12; i++) {
                particles.push(new LightTrail());
            }
        }

        function animate() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 繪製背景底光
            orbs.forEach(orb => {
                orb.x += orb.vx; orb.y += orb.vy;
                if (orb.x < 0 || orb.x > canvas.width) orb.vx *= -1;
                if (orb.y < 0 || orb.y > canvas.height) orb.vy *= -1;
                const g = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, orb.radius);
                g.addColorStop(0, orb.color);
                g.addColorStop(1, 'transparent');
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(orb.x, orb.y, orb.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // 繪製極慢流光
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
